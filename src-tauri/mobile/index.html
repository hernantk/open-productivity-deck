<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#17211f">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src 'self'; img-src 'self' data:">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Productivity Deck</title>
  <style>
    :root{font-family:"Segoe UI Variable",Segoe UI,sans-serif;color:#17211f;background:#17211f;font-synthesis:none;--paper:#f5f0e5;--ink:#17211f;--accent:#e9592f;--muted:#777b72;--rule:#c7c0b4;--panel:#253a35}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-width:300px;height:100svh;overflow:hidden;background:var(--ink);overscroll-behavior:none}
    button{font:inherit;color:inherit}
    button:focus-visible,[role=slider]:focus-visible{outline:3px solid #e9592f;outline-offset:3px}
    .shell{width:min(1080px,100%);height:100svh;margin:auto;padding:calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));overflow:hidden;background:linear-gradient(145deg,#f7f2e8,#e5dccd)}
    .connection{order:3;display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--muted);font-size:8px;font-weight:850;letter-spacing:0;text-transform:uppercase}
    .connection i{width:7px;height:7px;border-radius:50%;background:#ae413a;box-shadow:0 0 0 4px #ae413a20}.connection.online i{background:#3d8a72;box-shadow:0 0 0 4px #3d8a7225}
    .deck-layout{display:grid;grid-template-columns:minmax(0,1fr) clamp(184px,28vw,230px);gap:11px;align-items:stretch;height:100%;min-height:0}
    .apps-zone{display:grid;grid-template-rows:auto minmax(0,1fr) auto;min-width:0;min-height:0;padding-top:2px}
    .section-title{display:flex;align-items:center;gap:7px;min-height:20px;margin:0 0 7px;color:var(--muted);font-size:8px;font-weight:900;letter-spacing:.14em}.section-title::after{content:"";order:1;height:1px;flex:1;background:var(--rule)}
    .install-app{order:2;display:none;min-height:24px;padding:3px 8px;border:1px solid var(--ink);color:var(--paper);background:var(--ink);font-size:7px;font-weight:900;letter-spacing:.08em}
    .actions{display:grid;grid-template-columns:1fr;grid-auto-rows:minmax(64px,max-content);align-content:start;gap:8px;min-height:0;padding:2px 6px 2px 2px;overflow-x:hidden;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--rule) transparent}
    .action{--color:#e9592f;position:relative;display:grid;grid-template-columns:42px minmax(0,1fr);align-items:center;gap:9px;min-height:64px;padding:10px;border:0;color:var(--paper);background:var(--color);text-align:left;font-size:11px;font-weight:850;line-height:1.13;box-shadow:inset 0 0 0 1px #0002;transition:transform 100ms ease,filter 100ms ease}.action:active{transform:scale(.96);filter:brightness(.86)}
    .glyph{display:grid;place-items:center;width:42px;height:42px;overflow:hidden;border:1px solid #fff8;font-size:14px;font-weight:900}.glyph img{width:100%;height:100%;padding:4px;object-fit:contain}.action-label{overflow:hidden;text-overflow:ellipsis}.badge{position:absolute;top:-5px;right:-5px;display:grid;place-items:center;min-width:22px;height:22px;padding:0 5px;border:2px solid var(--paper);border-radius:20px;color:var(--paper);background:var(--ink);font-size:8px}.empty{padding:25px 10px;border:1px dashed var(--rule);color:var(--muted);text-align:center;font-size:10px;line-height:1.5}
    .control-rail{display:grid;grid-template-rows:minmax(0,1fr) 108px;gap:8px;min-width:0;min-height:0}
    .audio-zone{display:grid;grid-template-rows:auto minmax(0,1fr) auto;justify-items:center;min-width:0;min-height:0;padding:8px;color:var(--paper);background:var(--panel);box-shadow:5px 0 0 var(--accent)}
    .audio-zone .section-title{width:100%;color:#b8c3bd}.audio-zone .section-title::after{background:#ffffff35}
    .dial{--value:0;position:relative;align-self:center;width:min(100%,clamp(84px,calc(100svh - 235px),155px));aspect-ratio:1;margin:0 auto;border-radius:50%;background:conic-gradient(from 225deg,var(--accent) calc(var(--value)*.75%),#50615b 0 75%,transparent 0);touch-action:none;user-select:none}
    .dial::before{content:"";position:absolute;inset:8px;border-radius:50%;background:var(--panel)}.dial::after{content:"";position:absolute;inset:18px;border:1px solid #ffffff38;border-radius:50%;box-shadow:inset 0 1px #ffffff18}
    .dial-center{position:absolute;z-index:1;inset:22%;display:grid;place-items:center;align-content:center;pointer-events:none}.speaker{width:clamp(16px,5vw,25px);height:clamp(16px,5vw,25px);color:var(--accent)}.speaker path,.control-button svg path,.control-button svg rect{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.value{margin:-1px 0 -4px;font-size:clamp(31px,12vw,72px);font-weight:650;line-height:1;letter-spacing:-.1em}.unit{color:#b8c3bd;font-size:7px;font-weight:900;letter-spacing:.18em}.dial.muted{filter:grayscale(.72)}
    .audio-controls{display:grid;grid-template-columns:1fr 1fr;width:100%;gap:5px;margin-top:5px}.control-button{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;min-width:0;min-height:44px;padding:5px;border:1px solid #ffffff52;color:var(--paper);background:transparent;font-size:8px;font-weight:850;line-height:1.05;text-align:left}.control-button svg{width:17px;height:17px;flex:0 0 auto}.control-button.active{color:var(--ink);background:var(--paper);border-color:var(--paper)}.control-button:disabled{opacity:.42}
    .spotify-player{display:grid;grid-template-rows:minmax(0,1fr) 44px;gap:4px;min-width:0;height:108px;padding:8px 9px;color:#f2f8f3;background:var(--ink);box-shadow:5px 0 0 #1ed760;overflow:hidden}.spotify-track{display:grid;grid-template-columns:28px minmax(0,1fr);align-items:center;gap:8px;min-width:0}.spotify-mark{display:grid;place-items:center;width:28px;height:28px;border-radius:50%;color:#122017;background:#1ed760}.spotify-mark svg{width:18px;height:18px}.spotify-copy{min-width:0}.spotify-title,.spotify-artist{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.spotify-title{font-size:10px;line-height:14px}.spotify-artist{color:#aebbb4;font-size:8px;line-height:12px}.spotify-controls{display:grid;grid-template-columns:repeat(3,44px);justify-content:center;gap:6px}.spotify-control{display:grid;place-items:center;width:44px;height:44px;padding:0;border:1px solid #ffffff45;color:var(--paper);background:transparent}.spotify-control svg{width:18px;height:18px;fill:currentColor}.spotify-control.primary{border-color:#1ed760;color:#102017;background:#1ed760}.spotify-control:disabled{opacity:.35}.spotify-player.unavailable .spotify-mark{color:#51615a;background:#b4bdb8}
    .legal{margin:5px 0 0;color:var(--muted);font-size:6px;font-weight:750;letter-spacing:.07em;text-align:left;text-transform:uppercase}.toast{position:fixed;z-index:5;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));left:12px;padding:11px 13px;color:var(--paper);background:var(--ink);font-size:10px;font-weight:750;line-height:1.45;transform:translateY(150%);opacity:0;transition:transform 250ms cubic-bezier(.22,1,.36,1),opacity 180ms}.toast.show{transform:translateY(0);opacity:1}
    .auth-error{display:none;grid-column:1/-1;place-items:center;align-content:center;min-height:70svh;padding:28px;text-align:center}.auth-error strong{font-size:24px;letter-spacing:-.04em}.auth-error p{max-width:290px;color:var(--muted);font-size:12px;line-height:1.6}
    @media(min-width:520px){.deck-layout{grid-template-columns:minmax(0,1fr) clamp(184px,27vw,230px);gap:12px}.actions{grid-template-columns:repeat(2,minmax(0,1fr))}.control-button{font-size:8px}}
    @media(min-width:760px){.actions{grid-template-columns:repeat(3,minmax(0,1fr))}.action{grid-template-columns:48px 1fr;min-height:72px}.glyph{width:48px;height:48px}}
    @media(min-width:980px){.actions{grid-template-columns:repeat(4,minmax(0,1fr))}}
    @media(max-height:340px) and (orientation:landscape){.control-rail{grid-template-rows:minmax(0,1fr) 100px;gap:6px}.spotify-player{height:100px;padding-block:6px}.audio-zone{padding-block:5px}.section-title{min-height:16px;margin-bottom:3px}.dial{width:min(100%,max(76px,calc(100svh - 236px)))}.audio-controls{gap:4px;margin-top:3px}.control-button{min-height:40px;padding:4px;font-size:7px}.legal{margin-top:2px}}
    @media(orientation:portrait){.deck-layout{grid-template-columns:minmax(0,1fr) clamp(160px,46vw,210px)}.control-rail{grid-template-rows:minmax(0,1fr) 108px}.dial{width:min(100%,38vw,150px)}.action{grid-template-columns:38px minmax(0,1fr);padding:8px}.glyph{width:38px;height:38px}}
    @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
</head>
<body>
  <main class="shell" id="app">
    <div class="deck-layout">
      <section class="apps-zone"><div class="section-title"><span>APLICATIVOS</span><button class="install-app" id="install-app" type="button">INSTALAR</button><div class="connection" id="connection"><i></i><span>conectando</span></div></div><div class="actions" id="actions"><div class="empty">Carregando os atalhos do computador...</div></div><p class="legal">GPL-3.0-or-later · software sem garantia</p></section>
      <aside class="control-rail">
        <section class="audio-zone" aria-label="Controles de áudio">
          <div class="section-title">ÁUDIO</div>
          <div class="dial" id="dial" role="slider" tabindex="0" aria-label="Volume de saída" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="dial-center"><svg class="speaker" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a8.5 8.5 0 0 1 0 12"/></svg><strong class="value" id="volume">--</strong><span class="unit" id="unit">VOLUME</span></div></div>
          <div class="audio-controls">
            <button class="control-button" id="mute" type="button"><svg viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="m16 10 6 6m0-6-6 6"/></svg><span>Som</span></button>
            <button class="control-button" id="microphone" type="button"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3M8 21h8"/></svg><span>Microfone</span></button>
          </div>
        </section>
        <section class="spotify-player unavailable" id="spotify-player" aria-label="Controle do Spotify">
          <div class="spotify-track"><span class="spotify-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 9c5-1.5 10-.8 14 1.4M6 13c4-1 8-.5 12 1.2M7 17c3-.7 6-.3 9 .8"/></svg></span><span class="spotify-copy"><strong class="spotify-title" id="spotify-title">Spotify não está reproduzindo</strong><span class="spotify-artist" id="spotify-artist">Abra o Spotify no computador</span></span></div>
          <div class="spotify-controls">
            <button class="spotify-control" id="spotify-previous" type="button" aria-label="Música anterior" disabled><svg viewBox="0 0 24 24"><path d="M6 5h2v14H6zM18 6v12l-9-6z"/></svg></button>
            <button class="spotify-control primary" id="spotify-toggle" type="button" aria-label="Reproduzir" disabled><svg id="spotify-play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="spotify-control" id="spotify-next" type="button" aria-label="Próxima música" disabled><svg viewBox="0 0 24 24"><path d="M16 5h2v14h-2zM6 6v12l9-6z"/></svg></button>
          </div>
        </section>
      </aside>
      <section class="auth-error" id="auth-error"><strong>Acesso encerrado.</strong><p>Abra o Open Productivity Deck no computador e leia o novo QR Code.</p></section>
    </div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const TOKEN_KEY="open-productivity-deck-token",params=new URLSearchParams(location.search),supplied=params.get("token"),legacyToken=sessionStorage.getItem("deck-token");if(supplied){localStorage.setItem(TOKEN_KEY,supplied);sessionStorage.removeItem("deck-token");history.replaceState({},"",location.pathname)}else if(!localStorage.getItem(TOKEN_KEY)&&legacyToken){localStorage.setItem(TOKEN_KEY,legacyToken);sessionStorage.removeItem("deck-token")}
    const token=localStorage.getItem(TOKEN_KEY)||"",dial=document.getElementById("dial"),volume=document.getElementById("volume"),unit=document.getElementById("unit"),mute=document.getElementById("mute"),microphone=document.getElementById("microphone"),actions=document.getElementById("actions"),connection=document.getElementById("connection"),toast=document.getElementById("toast"),installButton=document.getElementById("install-app"),spotifyPlayer=document.getElementById("spotify-player"),spotifyTitle=document.getElementById("spotify-title"),spotifyArtist=document.getElementById("spotify-artist"),spotifyPrevious=document.getElementById("spotify-previous"),spotifyToggle=document.getElementById("spotify-toggle"),spotifyNext=document.getElementById("spotify-next"),spotifyPlayIcon=document.getElementById("spotify-play-icon");let state=null,toastTimer,volumeTimer,lastVolume=0,installPrompt=null;
    const api=(path,options={})=>fetch(`${path}?token=${encodeURIComponent(token)}`,{...options,headers:{"Content-Type":"application/json",...(options.headers||{})}}).then(async response=>{if(response.status===401){showAuthError();throw new Error("Acesso expirado")}if(!response.ok)throw new Error((await response.text())||"Falha na comunicação");return response.status===204?null:response.json()});
    function showToast(message){toast.textContent=message;toast.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove("show"),2600)}
    function showAuthError(){localStorage.removeItem(TOKEN_KEY);document.querySelector(".apps-zone").style.display="none";document.querySelector(".control-rail").style.display="none";document.getElementById("auth-error").style.display="grid";connection.classList.remove("online");connection.querySelector("span").textContent="expirado"}
    function initials(label){return label.trim().split(/\s+/).slice(0,2).map(word=>word[0]).join("").toUpperCase()||"?"}
    function render(next){state=next;document.title=`${next.title} · Productivity Deck`;connection.classList.add("online");connection.querySelector("span").textContent="local";if(next.audio)setAudio(next.audio);if(next.spotify)setSpotify(next.spotify);actions.replaceChildren();if(!next.buttons.length){const empty=document.createElement("div");empty.className="empty";empty.textContent="Configure os primeiros atalhos no computador.";actions.append(empty)}next.buttons.forEach(button=>{const element=document.createElement("button");element.type="button";element.className="action";element.style.setProperty("--color",button.color);const glyph=document.createElement("span");glyph.className="glyph";if(button.icon){const image=document.createElement("img");image.src=button.icon;image.alt="";glyph.append(image)}else glyph.textContent=initials(button.label);const label=document.createElement("span");label.className="action-label";label.textContent=button.label;element.append(glyph,label);const count=button.unreadProvider?next.unread[button.unreadProvider]:null;if(Number.isFinite(count)&&count>0){const badge=document.createElement("b");badge.className="badge";badge.textContent=count>99?"99+":String(count);element.append(badge)}element.addEventListener("click",()=>launch(button));actions.append(element)})}
    function setAudio(audio){if(!audio)return;state={...(state||{}),audio};lastVolume=Math.round(audio.volume*100);volume.textContent=lastVolume;dial.style.setProperty("--value",lastVolume);dial.setAttribute("aria-valuenow",String(lastVolume));dial.classList.toggle("muted",audio.muted);mute.classList.toggle("active",audio.muted);mute.querySelector("span").textContent=audio.muted?"Som mudo":"Som";unit.textContent=audio.muted?"MUDO":"VOLUME";microphone.disabled=audio.microphoneMuted===null;microphone.classList.toggle("active",audio.microphoneMuted===true);microphone.querySelector("span").textContent=audio.microphoneMuted===null?"Sem mic":audio.microphoneMuted?"Mic mudo":"Microfone"}
    function setSpotify(spotify){if(!spotify)return;state={...(state||{}),spotify};spotifyPlayer.classList.toggle("unavailable",!spotify.available);spotifyTitle.textContent=spotify.title||"Faixa sem título";spotifyArtist.textContent=spotify.artist||"Spotify";[spotifyPrevious,spotifyToggle,spotifyNext].forEach(button=>button.disabled=!spotify.available);spotifyToggle.setAttribute("aria-label",spotify.playing?"Pausar":"Reproduzir");spotifyPlayIcon.innerHTML=spotify.playing?'<path d="M7 5h4v14H7zM14 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>'}
    function load(){if(!token){showAuthError();return}api("/api/state").then(render).catch(error=>{connection.classList.remove("online");connection.querySelector("span").textContent="offline";if(error.message!=="Acesso expirado")showToast(error.message)})}
    function launch(button){navigator.vibrate?.(20);api(`/api/actions/${button.id}`,{method:"POST"}).then(()=>showToast(`${button.label} aberto no computador`)).catch(error=>showToast(error.message))}
    function loadSpotify(){if(!token)return;api("/api/spotify").then(setSpotify).catch(()=>{})}
    async function controlSpotify(action){navigator.vibrate?.(15);[spotifyPrevious,spotifyToggle,spotifyNext].forEach(button=>button.disabled=true);try{const spotify=await api(`/api/spotify/${action}`,{method:"POST"});setSpotify(spotify);setTimeout(loadSpotify,350)}catch(error){showToast(error.message);setSpotify(state?.spotify)}}
    function sendVolume(value){lastVolume=Math.max(0,Math.min(100,Math.round(value)));setAudio({volume:lastVolume/100,muted:false,microphoneMuted:state?.audio?.microphoneMuted??null});clearTimeout(volumeTimer);volumeTimer=setTimeout(()=>api("/api/volume",{method:"POST",body:JSON.stringify({value:lastVolume/100})}).then(setAudio).catch(error=>showToast(error.message)),55)}
    function volumeFromPointer(event){const rect=dial.getBoundingClientRect(),x=event.clientX-rect.left-rect.width/2,y=event.clientY-rect.top-rect.height/2;let angle=Math.atan2(y,x)*180/Math.PI;if(angle<0)angle+=360;let travel=(angle-135+360)%360;if(travel>270)travel=travel<315?270:0;sendVolume(travel/270*100)}
    dial.addEventListener("pointerdown",event=>{dial.setPointerCapture(event.pointerId);volumeFromPointer(event)});dial.addEventListener("pointermove",event=>{if(dial.hasPointerCapture(event.pointerId))volumeFromPointer(event)});dial.addEventListener("keydown",event=>{if(["ArrowUp","ArrowRight"].includes(event.key))sendVolume(lastVolume+2);if(["ArrowDown","ArrowLeft"].includes(event.key))sendVolume(lastVolume-2)});
    mute.addEventListener("click",()=>{navigator.vibrate?.(15);api("/api/mute",{method:"POST"}).then(setAudio).catch(error=>showToast(error.message))});microphone.addEventListener("click",()=>{navigator.vibrate?.(15);api("/api/microphone",{method:"POST"}).then(setAudio).catch(error=>showToast(error.message))});
    spotifyPrevious.addEventListener("click",()=>controlSpotify("previous"));spotifyToggle.addEventListener("click",()=>controlSpotify("toggle"));spotifyNext.addEventListener("click",()=>controlSpotify("next"));
    function connectEvents(){if(!token)return;const source=new EventSource(`/api/events?token=${encodeURIComponent(token)}`);source.addEventListener("unread",event=>{if(!state)return;try{render({...state,unread:JSON.parse(event.data)})}catch{}})}
    window.addEventListener("beforeinstallprompt",event=>{event.preventDefault();installPrompt=event;installButton.style.display="block"});installButton.addEventListener("click",async()=>{if(!installPrompt)return;installPrompt.prompt();await installPrompt.userChoice;installPrompt=null;installButton.style.display="none"});window.addEventListener("appinstalled",()=>{installButton.style.display="none"});if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
    load();connectEvents();setInterval(load,4000);setInterval(loadSpotify,1500);
  </script>
</body>
</html>
