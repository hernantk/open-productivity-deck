<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#17211f">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src 'self'; img-src 'self' data:">
  <title>Productivity Deck</title>
  <style>
    :root{font-family:"Segoe UI Variable",Segoe UI,sans-serif;color:#17211f;background:#17211f;font-synthesis:none;--paper:#f5f0e5;--ink:#17211f;--accent:#e9592f;--muted:#777b72;--rule:#c7c0b4;--panel:#253a35}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-width:300px;min-height:100svh;background:var(--ink);overscroll-behavior:none}
    button{font:inherit;color:inherit}
    button:focus-visible,[role=slider]:focus-visible{outline:3px solid #e9592f;outline-offset:3px}
    .shell{width:min(960px,100%);min-height:100svh;margin:auto;padding:calc(12px + env(safe-area-inset-top)) 12px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(145deg,#f7f2e8,#e5dccd)}
    header{display:flex;align-items:center;gap:9px;height:46px;margin-bottom:11px;padding-bottom:10px;border-bottom:1px solid var(--rule)}
    .mark{display:grid;place-items:center;width:34px;height:34px;flex:0 0 auto;color:var(--paper);background:var(--ink);font-size:12px;font-weight:900;letter-spacing:-.06em;transform:rotate(-3deg)}
    header>div:nth-child(2){min-width:0}
    .eyebrow{margin:0;color:var(--accent);font-size:8px;font-weight:900;letter-spacing:.16em}
    h1{overflow:hidden;margin:1px 0 0;font-size:15px;line-height:1.1;text-overflow:ellipsis;white-space:nowrap}
    .connection{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--muted);font-size:8px;font-weight:850;text-transform:uppercase}
    .connection i{width:7px;height:7px;border-radius:50%;background:#ae413a;box-shadow:0 0 0 4px #ae413a20}.connection.online i{background:#3d8a72;box-shadow:0 0 0 4px #3d8a7225}
    .deck-layout{display:grid;grid-template-columns:minmax(0,1fr) clamp(142px,43vw,286px);gap:11px;align-items:start}
    .apps-zone{min-width:0;padding-top:3px}
    .section-title{display:flex;align-items:center;gap:7px;margin:0 0 10px;color:var(--muted);font-size:8px;font-weight:900;letter-spacing:.14em}.section-title::after{content:"";height:1px;flex:1;background:var(--rule)}
    .actions{display:grid;grid-template-columns:1fr;gap:8px}
    .action{--color:#e9592f;position:relative;display:grid;grid-template-columns:42px minmax(0,1fr);align-items:center;gap:9px;min-height:64px;padding:10px;border:0;color:var(--paper);background:var(--color);text-align:left;font-size:11px;font-weight:850;line-height:1.13;box-shadow:inset 0 0 0 1px #0002;transition:transform 100ms ease,filter 100ms ease}.action:active{transform:scale(.96);filter:brightness(.86)}
    .glyph{display:grid;place-items:center;width:42px;height:42px;overflow:hidden;border:1px solid #fff8;font-size:14px;font-weight:900}.glyph img{width:100%;height:100%;padding:4px;object-fit:contain}.action-label{overflow:hidden;text-overflow:ellipsis}.badge{position:absolute;top:-5px;right:-5px;display:grid;place-items:center;min-width:22px;height:22px;padding:0 5px;border:2px solid var(--paper);border-radius:20px;color:var(--paper);background:var(--ink);font-size:8px}.empty{padding:25px 10px;border:1px dashed var(--rule);color:var(--muted);text-align:center;font-size:10px;line-height:1.5}
    .audio-zone{position:sticky;top:calc(10px + env(safe-area-inset-top));display:grid;justify-items:center;min-width:0;padding:12px 9px 10px;color:var(--paper);background:var(--panel);box-shadow:7px 7px 0 var(--accent)}
    .audio-zone .section-title{width:100%;color:#b8c3bd}.audio-zone .section-title::after{background:#ffffff35}
    .dial{--value:0;position:relative;width:min(100%,240px);aspect-ratio:1;margin:2px auto 6px;border-radius:50%;background:conic-gradient(from 225deg,var(--accent) calc(var(--value)*.75%),#50615b 0 75%,transparent 0);touch-action:none;user-select:none}
    .dial::before{content:"";position:absolute;inset:8px;border-radius:50%;background:var(--panel)}.dial::after{content:"";position:absolute;inset:18px;border:1px solid #ffffff38;border-radius:50%;box-shadow:inset 0 1px #ffffff18}
    .dial-center{position:absolute;z-index:1;inset:22%;display:grid;place-items:center;align-content:center;pointer-events:none}.speaker{width:clamp(16px,5vw,25px);height:clamp(16px,5vw,25px);color:var(--accent)}.speaker path,.control-button svg path,.control-button svg rect{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.value{margin:-1px 0 -4px;font-size:clamp(31px,12vw,72px);font-weight:650;line-height:1;letter-spacing:-.1em}.unit{color:#b8c3bd;font-size:7px;font-weight:900;letter-spacing:.18em}.dial.muted{filter:grayscale(.72)}
    .audio-controls{display:grid;width:100%;gap:7px;margin-top:5px}.control-button{display:flex;align-items:center;justify-content:flex-start;gap:8px;width:100%;min-height:44px;padding:8px 9px;border:1px solid #ffffff52;color:var(--paper);background:transparent;font-size:9px;font-weight:850;text-align:left}.control-button svg{width:18px;height:18px;flex:0 0 auto}.control-button.active{color:var(--ink);background:var(--paper);border-color:var(--paper)}.control-button:disabled{opacity:.42}
    .legal{grid-column:1/-1;margin:19px 0 0;color:var(--muted);font-size:7px;font-weight:750;letter-spacing:.08em;text-align:center;text-transform:uppercase}.toast{position:fixed;z-index:5;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));left:12px;padding:11px 13px;color:var(--paper);background:var(--ink);font-size:10px;font-weight:750;line-height:1.45;transform:translateY(150%);opacity:0;transition:transform 250ms cubic-bezier(.22,1,.36,1),opacity 180ms}.toast.show{transform:translateY(0);opacity:1}
    .auth-error{display:none;grid-column:1/-1;place-items:center;align-content:center;min-height:70svh;padding:28px;text-align:center}.auth-error strong{font-size:24px;letter-spacing:-.04em}.auth-error p{max-width:290px;color:var(--muted);font-size:12px;line-height:1.6}
    @media(min-width:520px){.shell{padding-inline:18px}.deck-layout{grid-template-columns:minmax(0,1fr) minmax(210px,286px);gap:18px}.actions{grid-template-columns:repeat(2,minmax(0,1fr))}.audio-zone{padding:16px}.control-button{font-size:10px}}
    @media(min-width:820px){.shell{padding-inline:28px}.actions{grid-template-columns:repeat(3,minmax(0,1fr))}.action{grid-template-columns:48px 1fr;min-height:72px}.glyph{width:48px;height:48px}}
    @media(max-height:500px) and (orientation:landscape){.shell{padding-top:8px}.audio-zone{position:static}.dial{width:min(27vh,150px)}.audio-controls{grid-template-columns:1fr 1fr}.control-button{font-size:8px}.actions{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
</head>
<body>
  <main class="shell" id="app">
    <header><div class="mark">OP</div><div><p class="eyebrow">OPEN PRODUCTIVITY</p><h1 id="title">Meu deck</h1></div><div class="connection" id="connection"><i></i><span>conectando</span></div></header>
    <div class="deck-layout">
      <section class="apps-zone"><div class="section-title">APLICATIVOS</div><div class="actions" id="actions"><div class="empty">Carregando os atalhos do computador...</div></div></section>
      <aside class="audio-zone" aria-label="Controles de áudio">
        <div class="section-title">ÁUDIO</div>
        <div class="dial" id="dial" role="slider" tabindex="0" aria-label="Volume de saída" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="dial-center"><svg class="speaker" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a8.5 8.5 0 0 1 0 12"/></svg><strong class="value" id="volume">--</strong><span class="unit" id="unit">VOLUME</span></div></div>
        <div class="audio-controls">
          <button class="control-button" id="mute" type="button"><svg viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="m16 10 6 6m0-6-6 6"/></svg><span>Mutar saída</span></button>
          <button class="control-button" id="microphone" type="button"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3M8 21h8"/></svg><span>Mutar microfone</span></button>
        </div>
      </aside>
      <section class="auth-error" id="auth-error"><strong>Acesso encerrado.</strong><p>Abra o Open Productivity Deck no computador e leia o novo QR Code.</p></section>
      <p class="legal">GPL-3.0-or-later · software sem garantia</p>
    </div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const params=new URLSearchParams(location.search),supplied=params.get("token");if(supplied){sessionStorage.setItem("deck-token",supplied);history.replaceState({},"",location.pathname)}
    const token=sessionStorage.getItem("deck-token")||"",dial=document.getElementById("dial"),volume=document.getElementById("volume"),unit=document.getElementById("unit"),mute=document.getElementById("mute"),microphone=document.getElementById("microphone"),actions=document.getElementById("actions"),connection=document.getElementById("connection"),toast=document.getElementById("toast");let state=null,toastTimer,volumeTimer,lastVolume=0;
    const api=(path,options={})=>fetch(`${path}?token=${encodeURIComponent(token)}`,{...options,headers:{"Content-Type":"application/json",...(options.headers||{})}}).then(async response=>{if(response.status===401){showAuthError();throw new Error("Acesso expirado")}if(!response.ok)throw new Error((await response.text())||"Falha na comunicação");return response.status===204?null:response.json()});
    function showToast(message){toast.textContent=message;toast.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove("show"),2600)}
    function showAuthError(){document.querySelector(".apps-zone").style.display="none";document.querySelector(".audio-zone").style.display="none";document.getElementById("auth-error").style.display="grid";connection.classList.remove("online");connection.querySelector("span").textContent="expirado"}
    function initials(label){return label.trim().split(/\s+/).slice(0,2).map(word=>word[0]).join("").toUpperCase()||"?"}
    function render(next){state=next;document.getElementById("title").textContent=next.title;connection.classList.add("online");connection.querySelector("span").textContent="local";if(next.audio)setAudio(next.audio);actions.replaceChildren();if(!next.buttons.length){const empty=document.createElement("div");empty.className="empty";empty.textContent="Configure os primeiros atalhos no computador.";actions.append(empty)}next.buttons.forEach(button=>{const element=document.createElement("button");element.type="button";element.className="action";element.style.setProperty("--color",button.color);const glyph=document.createElement("span");glyph.className="glyph";if(button.icon){const image=document.createElement("img");image.src=button.icon;image.alt="";glyph.append(image)}else glyph.textContent=initials(button.label);const label=document.createElement("span");label.className="action-label";label.textContent=button.label;element.append(glyph,label);const count=button.unreadProvider?next.unread[button.unreadProvider]:null;if(Number.isFinite(count)&&count>0){const badge=document.createElement("b");badge.className="badge";badge.textContent=count>99?"99+":String(count);element.append(badge)}element.addEventListener("click",()=>launch(button));actions.append(element)})}
    function setAudio(audio){if(!audio)return;state={...(state||{}),audio};lastVolume=Math.round(audio.volume*100);volume.textContent=lastVolume;dial.style.setProperty("--value",lastVolume);dial.setAttribute("aria-valuenow",String(lastVolume));dial.classList.toggle("muted",audio.muted);mute.classList.toggle("active",audio.muted);mute.querySelector("span").textContent=audio.muted?"Restaurar som":"Mutar saída";unit.textContent=audio.muted?"MUDO":"VOLUME";microphone.disabled=audio.microphoneMuted===null;microphone.classList.toggle("active",audio.microphoneMuted===true);microphone.querySelector("span").textContent=audio.microphoneMuted===null?"Microfone indisponível":audio.microphoneMuted?"Ligar microfone":"Mutar microfone"}
    function load(){if(!token){showAuthError();return}api("/api/state").then(render).catch(error=>{connection.classList.remove("online");connection.querySelector("span").textContent="offline";if(error.message!=="Acesso expirado")showToast(error.message)})}
    function launch(button){navigator.vibrate?.(20);api(`/api/actions/${button.id}`,{method:"POST"}).then(()=>showToast(`${button.label} aberto no computador`)).catch(error=>showToast(error.message))}
    function sendVolume(value){lastVolume=Math.max(0,Math.min(100,Math.round(value)));setAudio({volume:lastVolume/100,muted:false,microphoneMuted:state?.audio?.microphoneMuted??null});clearTimeout(volumeTimer);volumeTimer=setTimeout(()=>api("/api/volume",{method:"POST",body:JSON.stringify({value:lastVolume/100})}).then(setAudio).catch(error=>showToast(error.message)),55)}
    function volumeFromPointer(event){const rect=dial.getBoundingClientRect(),x=event.clientX-rect.left-rect.width/2,y=event.clientY-rect.top-rect.height/2;let angle=Math.atan2(y,x)*180/Math.PI;if(angle<0)angle+=360;let travel=(angle-135+360)%360;if(travel>270)travel=travel<315?270:0;sendVolume(travel/270*100)}
    dial.addEventListener("pointerdown",event=>{dial.setPointerCapture(event.pointerId);volumeFromPointer(event)});dial.addEventListener("pointermove",event=>{if(dial.hasPointerCapture(event.pointerId))volumeFromPointer(event)});dial.addEventListener("keydown",event=>{if(["ArrowUp","ArrowRight"].includes(event.key))sendVolume(lastVolume+2);if(["ArrowDown","ArrowLeft"].includes(event.key))sendVolume(lastVolume-2)});
    mute.addEventListener("click",()=>{navigator.vibrate?.(15);api("/api/mute",{method:"POST"}).then(setAudio).catch(error=>showToast(error.message))});microphone.addEventListener("click",()=>{navigator.vibrate?.(15);api("/api/microphone",{method:"POST"}).then(setAudio).catch(error=>showToast(error.message))});
    load();setInterval(load,4000);
  </script>
</body>
</html>
